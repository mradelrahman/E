<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex, nofollow">
    <title>صيانة المنصة | MR. ABDELRAHMAN</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --gold: #D4AF37;
            --gold-bright: #FFD700;
            --bg: #050505;
            --card-bg: rgba(15, 15, 15, 0.7);
            --border: rgba(212, 175, 55, 0.2);
            --hazard: repeating-linear-gradient(45deg, #f3cc14, #f3cc14 15px, #000 15px, #000 30px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
            user-select: none;
        }

        body {
            background-color: var(--bg);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* العلامة المائية - Watermark */
        .watermark {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-30deg);
            font-size: clamp(3rem, 15vw, 10rem);
            font-weight: 900;
            color: rgba(255, 255, 255, 0.03);
            white-space: nowrap;
            z-index: -1;
            pointer-events: none;
            text-transform: uppercase;
        }

        /* أشرطة التحذير المتحركة */
        .hazard-bar {
            position: fixed;
            width: 200%;
            height: 25px;
            background: var(--hazard);
            z-index: 100;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .top-bar { top: 0; transform: rotate(-1deg); left: -50%; animation: slideTape 20s linear infinite; }
        .bottom-bar { bottom: 0; transform: rotate(1deg); left: -50%; animation: slideTape 20s linear infinite reverse; }

        @keyframes slideTape {
            from { background-position: 0 0; }
            to { background-position: 500px 0; }
        }

        /* الحاوية الرئيسية */
        .container {
            width: 92%;
            max-width: 650px;
            padding: clamp(20px, 5vw, 50px);
            background: var(--card-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            border-radius: 30px;
            text-align: center;
            z-index: 10;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            margin: 20px auto;
        }

        .logo {
            color: var(--gold);
            font-weight: 900;
            font-size: 0.9rem;
            letter-spacing: 2px;
            margin-bottom: 20px;
            display: block;
        }

        /* قسم مفتاح الصيانة والعنوان */
        .maintenance-visual {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
        }

        .worker-icon {
            animation: wrench 2s infinite ease-in-out;
            color: var(--gold-bright);
        }

        @keyframes wrench {
            0%, 100% { transform: rotate(-10deg); }
            50% { transform: rotate(20deg); }
        }

        h1 {
            font-size: clamp(1.4rem, 6vw, 2.2rem);
            font-weight: 800;
            line-height: 1.3;
            background: linear-gradient(to bottom, #fff, #999);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: #888;
            font-size: clamp(0.85rem, 3vw, 1rem);
            margin-bottom: 30px;
            line-height: 1.6;
        }

        /* جملة سنعود قريبا */
        .return-text {
            color: var(--gold-bright);
            font-weight: 700;
            font-size: clamp(1.1rem, 4vw, 1.4rem);
            margin-bottom: 15px;
            display: block;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }

        /* حاوية العداد والساعة الرملية */
        .timer-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: clamp(15px, 4vw, 30px);
            background: rgba(0,0,0,0.4);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 25px;
        }

        /* الساعة الرملية المتحركة */
        .hourglass-box {
            animation: flipHourglass 4s infinite ease-in-out;
            color: var(--gold-bright);
            filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.3));
        }

        @keyframes flipHourglass {
            0%, 90% { transform: rotate(0deg); }
            100% { transform: rotate(180deg); }
        }

        /* أرقام العداد */
        .countdown-display {
            display: flex;
            align-items: center;
            gap: clamp(8px, 2vw, 15px);
            direction: ltr;
        }

        .unit { text-align: center; }
        .val { 
            font-size: clamp(1.8rem, 6vw, 2.8rem); 
            font-weight: 900; 
            color: #fff; 
            display: block;
        }
        .lab { 
            font-size: 0.7rem; 
            color: var(--gold); 
            text-transform: uppercase; 
            font-weight: 600;
        }

        .separator { 
            font-size: 1.5rem; 
            color: var(--border); 
            padding-bottom: 15px;
        }

        /* شريط التقدم */
        .progress-container {
            margin-bottom: 30px;
        }
        .progress-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: #666;
            margin-bottom: 8px;
        }
        .progress-bar {
            height: 6px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--gold), #fff);
            box-shadow: 0 0 15px var(--gold);
            transition: width 1s ease;
        }

        /* سجل النشاط الصغير */
        .log {
            font-size: 0.8rem;
            color: #00ff88;
            background: rgba(0,255,136,0.05);
            padding: 8px 15px;
            border-radius: 10px;
            margin-bottom: 25px;
            display: inline-block;
        }

        .btn {
            background: #fff;
            color: #000;
            padding: 12px 35px;
            border-radius: 50px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.9rem;
        }
        .btn:active { transform: scale(0.95); }

        footer {
            margin-top: 25px;
            font-size: 0.75rem;
            color: #444;
        }

        /* تحسينات الهواتف الصغيرة جداً */
        @media (max-width: 400px) {
            .container { padding: 25px 15px; }
            .timer-wrapper { flex-direction: column; gap: 15px; padding: 15px; }
            .hourglass-box { margin-bottom: 5px; }
            .val { font-size: 1.8rem; }
            .maintenance-visual svg { width: 30px; height: 30px; }
        }
    </style>
</head>
<body>

    <div class="watermark">MR. ABDELRAHMAN</div>

    <div class="hazard-bar top-bar"></div>
    <div class="hazard-bar bottom-bar"></div>

    <div class="container">
        <span class="logo">MR. ABDELRAHMAN</span>
        
        <div class="maintenance-visual">
            <svg class="worker-icon" width="35" height="35" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
            <h1>جارى صيانة المنصة</h1>
        </div>

        <p class="subtitle">جارى صيانة و تحسين التجربة للمستخدم لنقدم لك تجربة سريعة و احترافية و بسيطة</p>

        <span class="return-text">سنعود قريبا :</span>

        <div class="timer-wrapper">
            <div class="hourglass-box">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M5 22h14M5 2h14M17 22c0-4-3-7-3-7s3-3 3-7V2H7v6c0 4 3 7 3 7s-3 3-3 7" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>

            <div class="countdown-display">
                <div class="unit">
                    <span class="val" id="h">00</span>
                    <span class="lab">ساعة</span>
                </div>
                <div class="separator">:</div>
                <div class="unit">
                    <span class="val" id="m">00</span>
                    <span class="lab">دقيقة</span>
                </div>
                <div class="separator">:</div>
                <div class="unit">
                    <span class="val" id="s">00</span>
                    <span class="lab">ثانية</span>
                </div>
            </div>
        </div>

        <div class="progress-container">
            <div class="progress-info">
                <span id="p-text">نسبة الإنجاز: 0%</span>
                <span>تحديث السيرفرات</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="p-bar"></div>
            </div>
        </div>

        <div class="log" id="status-log">جارى فحص الأمان...</div>

        <br>
        <button class="btn" onclick="location.reload()">تحديث الحالة</button>

        <footer>شكراً لصبركم ❤️</footer>
    </div>

    <script>
        function updateMaintenance() {
            const now = new Date();
            let target = new Date();
            target.setHours(10, 0, 0, 0); // يستهدف الساعة 10 صباحاً
            
            if (now >= target) target.setDate(target.getDate() + 1);
            
            const diff = target - now;
            const h = Math.floor(diff / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);

            document.getElementById('h').innerText = h.toString().padStart(2, '0');
            document.getElementById('m').innerText = m.toString().padStart(2, '0');
            document.getElementById('s').innerText = s.toString().padStart(2, '0');

            // حساب شريط التقدم 
            const progress = ((86400000 - diff) / 86400000) * 100;
            const finalP = Math.min(Math.max(progress, 10), 99);
            document.getElementById('p-bar').style.width = finalP + "%";
            document.getElementById('p-text').innerText = `نسبة الإنجاز: ${Math.floor(finalP)}%`;
        }

        const logs = [
            "تحسين سرعة الاستجابة...",
            "تحديث قواعد بيانات الطلاب...",
         "إضافة محتوى تعليمي جديد...",
            "تحسين تجربةالطالب..."
        ];
        
        let i = 0;
        function rotateLogs() {
            const el = document.getElementById('status-log');
            el.style.opacity = 0;
            setTimeout(() => {
                el.innerText = logs[i];
                el.style.opacity = 1;
                i = (i + 1) % logs.length;
            }, 400);
        }

        setInterval(updateMaintenance, 1000);
        setInterval(rotateLogs, 4000);
        updateMaintenance();
        rotateLogs();
    </script>
</body>
                        </html>
